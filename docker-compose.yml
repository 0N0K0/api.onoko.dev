services:
  api:
    build: ./api
    container_name: api
    restart: always
    environment:
      - NODE_ENV=development
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=root
    volumes:
      - ./api:/usr/src/app
    ports:
      - "4000:4000"
    depends_on:
      - db
    command: npm run dev
  db:
    image: mariadb:11
    container_name: db
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=onokodb
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
  apache:
    image: httpd:2.4
    container_name: apache
    restart: always
    depends_on:
      - api
    ports:
      - "8080:80"
    volumes:
      - ./apache/httpd.conf:/usr/local/apache2/conf/httpd.conf:ro
  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit
    restart: always
    ports:
      - "8025:8025" # Interface web
      - "1025:1025" # SMTP
volumes:
  db_data:
